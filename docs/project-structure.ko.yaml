문서_메타데이터:
  제목: "doyoulikeclassic-landing 프로젝트 구성 설명"
  언어: "ko-KR"
  작성일: "2026-05-25"
  기준_브랜치_상태: "현재 로컬 작업 디렉터리 기준"
  목적: >
    이 YAML은 doyoulikeclassic-landing 저장소가 어떤 파일 구조로 되어 있고,
    Express/EJS/SQLite 기반 랜딩 페이지와 관리자(admin) 기능이 어떤 흐름으로
    작동하는지 한글로 상세히 설명하기 위한 문서이다.
  주의:
    - "node_modules 폴더는 설치된 외부 패키지 폴더라 상세 파일 목록에서 제외한다."
    - "data/classic-rotation.sqlite 파일은 현재 로컬에 존재하는 실행용 SQLite DB이지만 .gitignore에 의해 Git에는 포함하지 않는 런타임 데이터이다."
    - 신청자 개인정보는 이 앱 DB에 저장하지 않고 Google Forms에서 관리하도록 설계되어 있다.

프로젝트_요약:
  서비스명: "클래식을 좋아하세요"
  package_name: "classic-rotation-landing"
  버전: "0.1.0"
  앱_성격:
    - "클래식 취향 기반 로테이션 소개팅 랜딩 페이지"
    - "운영자가 행사 일정과 랜딩 콘텐츠를 수정할 수 있는 B-lite 관리자 시스템"
    - "Raspberry Pi + Node.js + Nginx + SQLite 배포를 염두에 둔 작은 서버 앱"
  주요_사용자:
    공개_방문자:
      설명: "랜딩 페이지에서 행사 정보, 지원현황, FAQ, Instagram 링크를 보고 Google Form으로 신청한다."
      경로: "/"
    관리자:
      설명: "단일 비밀번호로 로그인해 행사, 대표 일정, 콘텐츠, FAQ, 법무/연락처 정보를 수정한다."
      경로:
        로그인: "/admin/login"
        대시보드: "/admin"
  핵심_원칙:
    - "공개 페이지에는 대표로 지정된 행사 1개만 표시한다."
    - "관리자는 여러 행사를 저장하고 그중 하나를 대표 행사로 지정할 수 있다."
    - "신청은 앱 내부 폼이 아니라 Google Forms 외부 링크로 이동한다."
    - "앱 DB에는 신청자 이름, 연락처, 생년월일, 결제정보 같은 개인정보를 저장하지 않는다."
    - "시드 데이터는 초기 기본값일 뿐이며, 관리자 수정 내용을 덮어쓰지 않도록 설계되어 있다."

기술_스택:
  런타임:
    node: "Node.js 20 이상 권장"
    module_system: "ES Modules(package.json의 type: module)"
  서버:
    express: "HTTP 서버와 라우팅"
    ejs: "서버 사이드 HTML 템플릿"
    helmet: "기본 보안 HTTP 헤더"
    cookie_parser: "서명 쿠키 파싱"
    express_rate_limit: "관리자 로그인 시도 제한"
  데이터:
    better_sqlite3: "SQLite 파일 DB 접근"
    sqlite_file_default: "data/classic-rotation.sqlite"
    test_db: ":memory: 또는 data/test-playwright.sqlite"
  검증_보안:
    zod: "관리자 입력값 스키마 검증"
    nanoid: "행사 ID, 세션 토큰, CSRF 토큰 생성"
    node_crypto: "타이밍 안전 문자열 비교와 HMAC 토큰 해시"
  프론트엔드:
    css: "public/styles.css 단일 스타일시트"
    javascript: "public/site.js 바닐라 JS"
    assets: "public/assets/images/*.jpg"
  테스트:
    vitest: "단위/통합 테스트"
    supertest: "Express HTTP 테스트"
    playwright: "브라우저 렌더링/반응형/이미지 테스트"

루트_파일:
  package.json:
    역할: "프로젝트 메타데이터, 실행 스크립트, 의존성 정의"
    중요_설정:
      type: "module"
      private: true
    scripts:
      dev: "node --watch server.js"
      start: "node server.js"
      test: "vitest run"
      test_watch: "vitest"
      test_browser: "playwright test"
      db_seed: "node src/db/seed.js"
    dependencies:
      - "better-sqlite3"
      - "cookie-parser"
      - "dotenv"
      - "ejs"
      - "express"
      - "express-rate-limit"
      - "helmet"
      - "nanoid"
      - "zod"
    devDependencies:
      - "@playwright/test"
      - "supertest"
      - "vitest"
  package-lock.json:
    역할: "npm 설치 의존성 버전을 잠그는 파일"
    운영_의미: "배포나 재설치 시 동일한 패키지 트리를 만들기 위해 사용"
  server.js:
    역할: "프로덕션/로컬 실행 진입점"
    실행_흐름:
      - "loadConfig()로 환경 설정을 읽는다."
      - "config.dbPath에 SQLite 파일이 없으면 createDatabase() 후 seedDatabase()를 실행한다."
      - "createApp(config)로 Express 앱을 만든다."
      - "config.port에서 listen한다."
    자동_시딩:
      조건: "DB 파일이 없을 때만 자동 실행"
      이유: "처음 배포하거나 새 환경에서 실행할 때 기본 행사/콘텐츠를 생성하기 위함"
  README.md:
    역할: "로컬 개발, 테스트, 운영 개요"
    주요_명령:
      - "npm install"
      - "cp .env.example .env"
      - "npm run db:seed"
      - "npm run dev"
    접속_URL:
      public: "http://localhost:3000"
      admin: "http://localhost:3000/admin"
  .env.example:
    역할: "환경 변수 예시"
    변수:
      NODE_ENV: "development"
      PORT: "3000"
      DATABASE_PATH: "data/classic-rotation.sqlite"
      ADMIN_PASSWORD: "change-this-before-production"
      SESSION_SECRET: "replace-with-a-long-random-string"
      PUBLIC_BASE_URL: "http://localhost:3000"
    보안_주의:
      - "실제 .env는 Git에 커밋하지 않는다."
      - "production에서는 ADMIN_PASSWORD와 SESSION_SECRET을 강한 값으로 바꿔야 한다."
  .gitignore:
    역할: "Git에 포함하지 않을 로컬/생성 파일 정의"
    제외_대상:
      - "node_modules/"
      - ".env"
      - ".env.local"
      - "data/*.sqlite"
      - "data/*.sqlite-*"
      - "logs/"
      - "coverage/"
      - "playwright-report/"
      - "test-results/"
      - ".DS_Store"
      - ".superpowers/"
  vitest.config.js:
    역할: "Vitest 테스트 설정"
    동작:
      - "node_modules, dist, tests/playwright 폴더를 Vitest 대상에서 제외한다."
      - "Playwright 테스트는 npm run test:browser로 별도 실행한다."
  playwright.config.js:
    역할: "브라우저 테스트 설정"
    포트: 3210
    webServer:
      command: "rm -f data/test-playwright.sqlite && npm run start"
      database: "data/test-playwright.sqlite"
      env:
        NODE_ENV: "test"
        ADMIN_PASSWORD: "secret"
        SESSION_SECRET: "test-secret-for-browser-verification"
    projects:
      - "Desktop Chrome"
      - "Mobile Safari(iPhone 13)"

디렉터리_구조:
  src:
    설명: "서버 앱의 핵심 로직"
    하위:
      app_js: "Express 앱 팩토리"
      config_js: "환경 설정 로더"
      db: "SQLite 연결, 스키마, 시드"
      routes: "공개/관리자 라우터"
      services: "비즈니스 로직, 공개 모델, 보안"
      middleware: "관리자 인증/CSRF 미들웨어"
  views:
    설명: "EJS 서버 렌더링 템플릿"
    파일:
      layout_ejs: "공통 HTML 문서 껍데기"
      index_ejs: "공개 랜딩 페이지"
      admin_login_ejs: "관리자 로그인"
      admin_dashboard_ejs: "관리자 운영 대시보드"
  public:
    설명: "정적 파일"
    파일:
      styles_css: "전체 공개/관리자 화면 스타일"
      site_js: "공개 페이지 인터랙션"
      assets_images: "랜딩에 쓰는 JPG 이미지"
  tests:
    설명: "Vitest/Supertest/Playwright 테스트"
  docs:
    설명: "배포, 보안, 구현 계획, 설계 기록 문서"
  data:
    설명: "로컬 SQLite DB 저장 위치"
    git_포함: false

애플리케이션_초기화_흐름:
  1_loadConfig:
    파일: "src/config.js"
    설명: "process.env와 createApp(overrides)를 합쳐 config 객체를 만든다."
    반환값:
      nodeEnv: "NODE_ENV 또는 development"
      port: "PORT 또는 3000"
      dbPath: "DATABASE_PATH 또는 data/classic-rotation.sqlite"
      adminPassword: "ADMIN_PASSWORD 또는 개발용 placeholder"
      sessionSecret: "SESSION_SECRET 또는 개발용 placeholder"
      publicBaseUrl: "PUBLIC_BASE_URL 또는 http://localhost:3000"
      secureCookies: "NODE_ENV가 production이면 true"
    production_검증:
      - "ADMIN_PASSWORD가 비어 있거나 change-this-before-production이면 에러"
      - "SESSION_SECRET이 dev-session-secret 또는 replace-with-a-long-random-string이면 에러"
  2_createDatabase:
    파일: "src/db/database.js"
    설명: "SQLite DB를 열고 schema.sql을 실행해 필요한 테이블을 보장한다."
    동작:
      - "dbPath가 :memory:가 아니면 상위 디렉터리를 자동 생성한다."
      - "better-sqlite3 Database 인스턴스를 만든다."
      - "foreign_keys = ON pragma를 켠다."
      - "src/db/schema.sql을 읽어 exec한다."
  3_seedDatabase:
    파일: "src/db/seed.js"
    설명: "기본 행사, 시간대, 가격, 콘텐츠 블록을 삽입한다."
    특징:
      - "insert on conflict do nothing을 사용해 기존 관리자 수정을 보존한다."
      - "대표 행사가 이미 있으면 새 시드 행사를 대표로 강제 지정하지 않는다."
      - "시드 child row에는 안정적인 ID를 사용한다."
      - "예전 랜덤 ID 기반 시드 child row를 안정 ID로 마이그레이션하거나 중복 제거한다."
  4_createApp:
    파일: "src/app.js"
    설명: "Express 앱을 만들고 미들웨어, 라우터, EJS, 정적 파일을 연결한다."
    전역_로컬:
      app.locals.config: "환경 설정"
      app.locals.db: "SQLite DB 인스턴스"
      app.locals.serviceName: "클래식을 좋아하세요"
    미들웨어_순서:
      - "helmet()"
      - "cookieParser(config.sessionSecret)"
      - "express.urlencoded({ extended: false })"
      - "express.json()"
      - "express.static(public)"
      - "request.db와 request.config 주입"
      - "/admin 라우터"
      - "/ 공개 라우터"
    production_프록시:
      조건: "config.nodeEnv === production"
      동작: "app.set('trust proxy', 1)"

라우팅:
  공개:
    파일: "src/routes/public.js"
    "GET_/":
      설명: "공개 랜딩 페이지 렌더링"
      흐름:
        - "buildPublicModel(request.db)로 화면 모델 생성"
        - "views/index.ejs를 먼저 렌더링"
        - "렌더링된 body를 views/layout.ejs에 주입"
      응답_내용:
        - "대표 행사"
        - "히어로 콘텐츠"
        - "지원현황"
        - "진행 방식"
        - "참여자 예시"
        - "Instagram 릴스 링크"
        - "FAQ"
        - "법무/연락처 푸터"
  관리자:
    파일: "src/routes/admin.js"
    공통:
      - "adminRouter.use(attachAdmin)로 모든 관리자 요청에 세션 정보를 붙인다."
      - "POST 변경 요청은 requireAdmin과 requireCsrf를 사용한다."
    "GET_/admin/login":
      설명: "로그인 화면"
      동작:
        - "이미 로그인된 세션이 있으면 /admin으로 redirect"
        - "아니면 admin-login.ejs 렌더링"
    "POST_/admin/login":
      설명: "관리자 비밀번호 로그인"
      보호:
        rate_limit: "15분에 10회, 성공 요청은 카운트 제외"
        password_compare: "safeCompareText로 타이밍 안전 비교"
      성공:
        - "createSession으로 48자 세션 토큰과 32자 CSRF 토큰 생성"
        - "admin_session 서명 쿠키 발급"
        - "admin_audit_log에 login_success 기록"
        - "/admin으로 redirect"
      실패:
        - "admin_audit_log에 login_failed 기록"
        - "401 상태와 오류 메시지 렌더링"
    "POST_/admin/logout":
      설명: "관리자 로그아웃"
      보호:
        - "requireAdmin"
        - "requireCsrf"
      동작:
        - "DB의 admin_sessions에서 현재 토큰 삭제"
        - "admin_session 쿠키 제거"
        - "/admin/login으로 redirect"
    "GET_/admin":
      설명: "운영 대시보드"
      보호:
        - "requireAdmin"
      화면_데이터:
        - "buildPublicModel로 공개 페이지 모델"
        - "listEvents로 모든 행사"
        - "getContentForAdmin으로 편집용 콘텐츠"
        - "request.adminSession.csrf_token"
    "POST_/admin/events":
      설명: "새 일정 추가"
      보호:
        - "requireAdmin"
        - "requireCsrf"
      서비스: "createEvent"
      성공: "event_created 감사 로그 후 /admin redirect"
      실패: "400과 대시보드 오류 표시"
    "POST_/admin/events/:id":
      설명: "기존 일정 수정"
      보호:
        - "requireAdmin"
        - "requireCsrf"
      서비스: "updateEvent"
      성공: "event_updated 감사 로그 후 /admin redirect"
      실패:
        - "행사 없음: 404 Event not found"
        - "검증 실패: 400과 대시보드 오류 표시"
    "POST_/admin/events/:id/feature":
      설명: "특정 일정을 공개 대표 행사로 지정"
      보호:
        - "requireAdmin"
        - "requireCsrf"
      서비스: "featureEvent"
      동작:
        - "모든 행사의 is_featured를 0으로 변경"
        - "지정 행사를 is_featured=1, is_visible=1로 변경"
      성공: "event_featured 감사 로그 후 /admin redirect"
    "POST_/admin/content":
      설명: "홈 콘텐츠, 지원현황, Instagram, FAQ, 법무 정보 수정"
      보호:
        - "requireAdmin"
        - "requireCsrf"
      서비스: "updateContent"
      성공: "content_updated 감사 로그 후 /admin redirect"

공개_모델:
  파일: "src/services/publicModel.js"
  buildPublicModel:
    설명: "index.ejs에 넘길 공개 화면용 모델 생성"
    반환:
      serviceName: "클래식을 좋아하세요"
      featuredEvent: "대표 행사 객체 또는 null"
      content: "content_blocks에서 읽은 공개 콘텐츠"
      hasOpenApplication: "현재 공개 신청 링크가 있으면 true"
  getFeaturedEvent:
    선택_조건:
      - "events.is_featured = 1"
      - "events.is_visible = 1"
      - "events.status != hidden"
    포함_데이터:
      - "행사 제목, 기수, 날짜, 지역, 장소, 정원, 신청 조건"
      - "상태별 CTA"
      - "시간 슬롯"
      - "참가비 행"
    google_form_url_노출:
      조건:
        - "CTA가 enabled인 상태(open 또는 closing-soon)"
        - "URL이 https"
        - "host가 forms.gle 또는 docs.google.com/forms/*"
      불가_시: "빈 문자열로 바꿔 공개 페이지에 신청 href를 노출하지 않는다."
  CTA_상태:
    open:
      label: "이번 기수 신청하기"
      enabled: true
    closing-soon:
      label: "마감 전 신청하기"
      enabled: true
    closed:
      label: "모집 마감"
      enabled: false
    scheduled:
      label: "신청 오픈 예정"
      enabled: false
    hidden:
      label: "신청 오픈 예정"
      enabled: false
    unknown_or_undefined:
      label: "신청 오픈 예정"
      enabled: false
  content_blocks_처리:
    블록:
      - "hero"
      - "participants"
      - "applicationStatus"
      - "instagram"
      - "faq"
      - "legal"
    검증:
      - "각 블록 JSON을 파싱하고 Zod 스키마로 형태를 확인한다."
      - "형태가 틀리거나 JSON이 깨져 있으면 안전한 fallback을 반환한다."
    URL_정규화:
      - "applicationStatus.url은 https만 허용"
      - "instagram.url과 reels는 https만 허용"
